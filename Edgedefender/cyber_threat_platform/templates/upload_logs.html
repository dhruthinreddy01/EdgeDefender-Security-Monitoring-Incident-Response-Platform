{% extends "layout.html" %}

{% block content %}
<h1>Upload Logs</h1>
<form action="/upload_logs" method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <label for="logFile" class="form-label">Upload Log File</label>
        <input class="form-control" type="file" id="logFile" name="logFile" required>
    </div>
    <button type="submit" class="btn btn-primary">Upload</button>
</form>
{% if alerts %}
<h2>Detection Results</h2>
<ul>
    {% for alert in alerts %}
    <li>{{ alert }}</li>
    {% endfor %}
</ul>
{% endif %}
{% endblock %}
